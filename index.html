<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MusicMania Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="theme-green">
    
    <div class="app-container">
        <header class="mobile-header">
            <div class="logo">Music<span>Mania</span></div>
        </header>

        <main class="player-screen">
            <div class="vinyl-wrapper">
                <div id="vinyl-glow" class="vinyl-glow"></div>
                <div id="vinyl-disk" class="vinyl">
                    <div class="vinyl-center">MM</div>
                </div>
            </div>
            
            <div class="track-info">
                <h2 id="player-title">Выберите трек</h2>
                <p id="player-author">MusicMania Pro</p>
                <div id="current-playlist-name" style="font-size: 10px; color: var(--accent); margin-top: 5px; opacity: 0.8; height: 12px;"></div>
            </div>

            <div class="controls-section">
                <div class="progress-block">
                    <span id="current-time">0:00</span>
                    <input type="range" id="progress-bar" min="0" max="100" value="0">
                    <span id="duration">0:00</span>
                </div>

                <div class="main-btns-container">
                    <button id="shuffle-btn" class="secondary-action-btn"><i class="fas fa-random"></i></button>

                    <div class="main-btns">
                        <button id="prev-btn"><i class="fas fa-step-backward"></i></button>
                        <button id="play-btn" class="play-trigger"><i class="fas fa-play"></i></button>
                        <button id="next-btn"><i class="fas fa-step-forward"></i></button>
                    </div>

                    <button id="quick-add-btn" class="quick-action-btn"><i class="fas fa-plus"></i></button>
                </div>
            </div>
        </main>

        <div id="side-search" class="side-panel">
            <div class="panel-header">
                <h3>Поиск</h3>
                <button class="panel-close-btn" onclick="togglePanel('side-search')">Отмена</button>
            </div>
            <div class="search-box-large">
                <input type="text" id="search-input" placeholder="Трек или артист...">
                <button id="search-btn"><i class="fas fa-search"></i></button>
            </div>
            <div id="search-results" class="results-list"></div>
        </div>

        <div id="side-playlist" class="side-panel">
            <div class="panel-header">
                <h3 id="playlist-view-title">Библиотека</h3>
                <button class="panel-close-btn" onclick="closePlaylistView()">Закрыть</button>
            </div>
            <div id="playlist-manager-tools">
                <div class="search-box-large" style="margin-bottom: 15px;">
                    <input type="text" id="new-playlist-name" placeholder="Название плейлиста...">
                    <button onclick="createNewPlaylist()"><i class="fas fa-plus"></i></button>
                </div>
            </div>
            <div id="playlist-content-area" class="results-list"></div>
        </div>

        <div id="side-themes" class="side-panel">
            <div class="panel-header">
                <h3>Темы</h3>
                <button class="panel-close-btn" onclick="togglePanel('side-themes')">ОК</button>
            </div>
            <div class="theme-grid">
                <button onclick="setTheme('black')" class="t-btn" style="background: #1DB954;"></button>
                <button onclick="setTheme('white')" class="t-btn" style="background: #ffffff;"></button>
                <button onclick="setTheme('blue')" class="t-btn" style="background: #001f3f;"></button>
                <button onclick="setTheme('green')" class="t-btn" style="background: #2ecc71;"></button>
                <button onclick="setTheme('red')" class="t-btn" style="background: #ff4757;"></button>
                <button onclick="setTheme('purple')" class="t-btn" style="background: #a29bfe;"></button>
            </div>
        </div>

        <nav class="tab-bar">
            <button onclick="togglePanel('side-search')"><i class="fas fa-search"></i><span>Поиск</span></button>
            <button onclick="showPlaylistManager()"><i class="fas fa-folder-plus"></i><span>Плейлисты</span></button>
            <button onclick="togglePanel('side-themes')"><i class="fas fa-palette"></i><span>Темы</span></button>
        </nav>
    </div>

    <div id="add-to-modal" class="modal-overlay" style="display:none">
        <div class="modal-content">
            <h4>Добавить в...</h4>
            <div id="target-playlist-list" class="modal-list"></div>
            <button class="panel-close-btn" onclick="closeModal()" style="width:100%; margin-top:15px; background: rgba(255,255,255,0.05)">Отмена</button>
        </div>
    </div>

    <div id="youtube-engine" style="display:none"></div>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="script.js"></script>
</body>
</html>
